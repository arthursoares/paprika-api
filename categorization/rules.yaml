# ============================================================
# COMPONENTS (sauces, stocks, etc.)
# ============================================================
components:
  sauce:
    keywords:
      - sauce
      - gravy
      - reduction
      - glaze
      - coulis
      - aioli
      - mayo
      - vinaigrette
    keywords_title_only: true  # avoid tagging dishes that just use sauce

  stock:
    keywords:
      - stock
      - broth
      - bone broth
      - dashi
    keywords_title_only: true

  spice_blend:
    keywords:
      - spice mix
      - spice blend
      - seasoning
      - rub
      - za'atar
      - dukkah
      - ras el hanout
      - garam masala
      - five spice
    keywords_title_only: true

  dressing:
    keywords:
      - dressing
      - vinaigrette
    keywords_title_only: true

# ============================================================
# MEAL TYPES
# ============================================================
meal_type:
  breakfast:
    keywords:
      - breakfast
      - brunch
      - pancake
      - waffle
      - eggs benedict
      - omelette
      - omelet
      - frittata
      - granola
      - porridge
      - overnight oats

  dessert:
    keywords:
      - dessert
      - desserts
      - chocolate
      - ice cream
      - gelato
      - pudding
      - custard
      - mousse
      - sorbet
      - caramel
      - vanilla
      - brownie
      - brownies
      - fudge
      - ganache
      - frosting
      - icing
      - glaze
    # Note: removed "sweet" (too broad) and source matching (catches savory bakes)
    check_categories:
      - baking  # anything in baking is also dessert

  mains:
    keywords:
      - main course
      - entrée
      - dinner
    # Most recipes are mains by default - use exclusion logic
    exclude_if_categories:
      - breakfast
      - dessert
      - snacks
      - side_dish
      - components

# ============================================================
# DIETARY TAGS
# ============================================================
tags:
  vegetarian:
    exclude:  # if ANY of these present, not vegetarian
      - chicken
      - beef
      - pork
      - lamb
      - fish
      - salmon
      - shrimp
      - prawn
      - bacon
      - prosciutto
      - pancetta
      - anchovy
      - meat
      - gelatin
      - ham
      - sausage
      - chorizo
      - duck
      - turkey
      - veal
      - venison
      - crab
      - lobster
      - mussel
      - clam
      - squid
      - octopus
    # This is a negative match - apply if NO excludes found

  keto:
    keywords:
      - keto
      - low-carb
      - low carb
    exclude:
      - pasta
      - bread
      - rice
      - potato
      - sugar
