# Paprika Recipe Categorization Rules
# Used by categorize.js to auto-assign categories
#
# Structure:
#   category_key:
#     keywords: [list of words to match in title/ingredients]
#     keywords_directions: [words to match in directions only]
#     exclude: [words that prevent this match]
#     sources: [cookbook names that auto-assign this category]
#     min_matches: N  # require N keyword matches (default: 1)

# ============================================================
# PROTEINS
# ============================================================
protein:
  chicken:
    keywords:
      - chicken
      - poultry
      - hen
      - thigh
      - drumstick
      - wing
      - breast meat
    exclude:
      - chickpea
      - chicken stock  # don't tag soups as chicken just for stock
      - chicken broth

  beef:
    keywords:
      - beef
      - steak
      - brisket
      - short rib
      - ribeye
      - sirloin
      - ground beef
      - mince
      - veal
      - oxtail

  lamb:
    keywords:
      - lamb
      - mutton
      - lamb chop
      - leg of lamb
      - lamb shoulder
      - rack of lamb

  pork:
    keywords:
      - pork
      - bacon
      - ham
      - prosciutto
      - pancetta
      - chorizo
      - sausage
      - pork belly
      - pork chop
      - tenderloin
    exclude:
      - chicken sausage
      - turkey bacon

  fish:
    keywords:
      - salmon
      - cod
      - trout
      - halibut
      - sea bass
      - snapper
      - tuna
      - mackerel
      - sardine
      - anchovy
      - fish
      - tilapia
      - swordfish
      - mahi

  seafood:
    keywords:
      - shrimp
      - prawn
      - crab
      - lobster
      - scallop
      - mussel
      - clam
      - oyster
      - squid
      - calamari
      - octopus
      - shellfish
      - seafood

