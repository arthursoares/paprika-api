      - broth
      - stew
      - chowder
      - bisque
      - consommé
      - gazpacho
      - pho
      - ramen

  salad:
    keywords:
      - salad
      - ceviche
    keywords_title_only: true  # "salad dressing" shouldn't tag as salad
